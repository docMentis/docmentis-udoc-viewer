name: Publish to npm

on:
    push:
        tags:
            - "v*"

jobs:
    publish:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v4
              with:
                  node-version: 22

            - run: npm ci

            - name: Generate styles
              run: node packages/udoc-viewer/scripts/build-styles.js

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - run: npm run build --workspace packages/udoc-viewer

            - run: npm publish --workspace packages/udoc-viewer --provenance --access public
