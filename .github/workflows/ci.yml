name: CI

on:
    push:
        branches: [main]
        tags-ignore:
            - "v*"
    pull_request:
        branches: [main]

concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

jobs:
    check:
        name: Lint, Format & Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - run: npm ci

            - name: Generate styles
              run: node packages/udoc-viewer/scripts/build-styles.js

            - name: Typecheck
              run: npm run typecheck

            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Build
              run: npm run build --workspace packages/udoc-viewer
